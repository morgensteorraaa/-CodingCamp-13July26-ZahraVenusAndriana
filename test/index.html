<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Runner — To Do List Dashboard</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #f5f5f0;
      color: #2c2c2c;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }
    #summary {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-weight: bold;
      font-size: 1rem;
      margin-bottom: 1.25rem;
    }
    #summary.all-pass {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    #summary.has-fail {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    #results {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    #results li {
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
      margin-bottom: 0.35rem;
      font-size: 0.9rem;
      word-break: break-word;
    }
    #results li.pass {
      background: #eaf7ee;
      color: #1e6b3c;
    }
    #results li.fail {
      background: #fde8e8;
      color: #8b1a1a;
    }
  </style>
</head>
<body>
  <h1>Test Results</h1>
  <div id="summary">Running…</div>
  <ul id="results"></ul>

  <!-- fast-check from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/fast-check/lib/fast-check.min.js"></script>

  <!-- expose fast-check as window.fc for test files -->
  <script>
    window.fc = fc; // fast-check auto-assigns itself to window.fc on the CDN build
  </script>

  <!-- minimal test harness -->
  <script>
    // ── Assert helper ──────────────────────────────────────────
    window.__assert = function assert(condition, message) {
      if (!condition) throw new Error(message || 'Assertion failed');
    };

    // ── Test registry ──────────────────────────────────────────
    var _results = [];
    var _passed  = 0;
    var _failed  = 0;

    /**
     * runTest(name, fn)
     * Runs fn() synchronously. Records pass or fail.
     * Catches errors thrown by assert() or fc.assert().
     */
    window.runTest = function runTest(name, fn) {
      try {
        fn();
        _passed++;
        _results.push({ name: name, ok: true });
      } catch (err) {
        _failed++;
        _results.push({ name: name, ok: false, message: err.message || String(err) });
      }
    };
  </script>

  <!-- main app (sets window.__TEST__ immediately on load, before DOMContentLoaded) -->
  <script src="../js/main.js"></script>

  <!-- test files loaded in order -->
  <script src="greeting.test.js"></script>
  <script src="timer.test.js"></script>
  <script src="todo.test.js"></script>
  <script src="links.test.js"></script>
  <script src="examples.test.js"></script>

  <!-- render summary and results after all test files have run -->
  <script>
    (function renderResults() {
      var total      = _passed + _failed;
      var summaryEl  = document.getElementById('summary');
      var resultsEl  = document.getElementById('results');

      // Summary banner
      summaryEl.textContent = _passed + ' passed, ' + _failed + ' failed out of ' + total + ' tests';
      summaryEl.className   = _failed === 0 ? 'all-pass' : 'has-fail';

      // Individual results
      for (var i = 0; i < _results.length; i++) {
        var r  = _results[i];
        var li = document.createElement('li');
        li.className = r.ok ? 'pass' : 'fail';
        if (r.ok) {
          li.textContent = '\u2705 PASS: ' + r.name;
        } else {
          li.textContent = '\u274C FAIL: ' + r.name + ' \u2014 ' + r.message;
        }
        resultsEl.appendChild(li);
      }
    })();
  </script>
</body>
</html>
